model:
  default: qwen2.5:14b
  provider: custom
  base_url: http://host.docker.internal:11434/v1
  api_key: ollama
  context_length: 8192

auxiliary:
  compression:
    model: qwen2.5:14b
    context_length: 8192

max_turns: 90

platforms:
  telegram:
    enabled: true
  api_server:
    enabled: true
    extra:
      host: 0.0.0.0
      key: hermes-agent-key

mcp_servers:
  agentmemory:
    command: npx
    args: ["-y", "@agentmemory/mcp"]

memory:
  provider: agentmemory

